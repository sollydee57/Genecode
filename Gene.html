<!DOCTYPE html>
<html>
<head>
<title>GeneCode v3 Ultimate</title>
<style>
body { font-family: Arial; padding:20px; background:#eef2f5; }
textarea { width:100%; font-family:monospace; }
#codeArea { height:140px; }
#db_genes { height:60px; }
pre { background:#fff; padding:10px; border:1px solid #ccc; }
button { padding:8px; margin:4px; }
fieldset { margin-top:15px; }
</style>
</head>
<body>

<h1>🧬 GeneCode v3 Ultimate</h1>

<!-- ================= TUTORIAL ================= -->
<h2>📘 Tutorial</h2>

<button onclick="loadTutorial(1)">Load Patient</button>
<button onclick="loadTutorial(2)">Analysis</button>
<button onclick="loadTutorial(3)">Variables</button>
<button onclick="loadTutorial(4)">Conditions</button>
<button onclick="loadTutorial(5)">Output</button>
<button onclick="loadTutorial(6)">Full Example</button>

<pre id="tutorialBox">Click a step 👆</pre>

<!-- ================= CODE ================= -->
<h2>GeneCode Script</h2>

<textarea id="codeArea">
load_patient: "ID_001"

set risk_limit: 5

analysis {}

if risk >= risk_limit {
    alert: "High risk detected"
}

output {
    show: risk
    show: score
}
</textarea>

<button onclick="run()">Run</button>

<h3>Output</h3>
<pre id="output"></pre>

<!-- ================= DATABASE ================= -->
<h2>Patient Database</h2>

<fieldset>
<legend>Add / Update Patient</legend>

ID: <input id="db_id" value="ID_002"><br>
Name: <input id="db_name" value="Bob"><br>
Age: <input id="db_age" type="number" value="40"><br>

Sex:
<select id="db_sex">
<option value="M">M</option>
<option value="F">F</option>
</select><br>

Family History:
<select id="db_family">
<option value="none">none</option>
<option value="some">some</option>
<option value="strong">strong</option>
</select><br>

Lifestyle:
<select id="db_lifestyle">
<option value="low">low</option>
<option value="medium">medium</option>
<option value="high">high</option>
</select><br>

Genes (JSON):
<textarea id="db_genes">
{"BRCA1":"moderate","TP53":"weak"}
</textarea><br>

<button onclick="savePatient()">Save Patient</button>
<button onclick="showDB()">Show DB</button>
<button onclick="exportDB()">Export DB</button>
<input type="file" id="importFile" onchange="importDB(event)">

</fieldset>

<pre id="dbView"></pre>

<script>
// ---------------- DATABASE ----------------
let patientsDB = {
 "ID_001": {
   name:"Alice", age:35, sex:"F",
   family_history:"some", lifestyle:"medium",
   genes:{ BRCA1:"strong", CFTR:"moderate" }
 }
};

// ---------------- CONDITIONS ----------------
const conditionsDB = {
 BRCA1:{male:0.4,female:1,base:{weak:1,moderate:2,strong:3}},
 BRCA2:{male:0.6,female:1,base:{weak:1,moderate:2,strong:3}},
 TP53:{male:1,female:1,base:{weak:1,moderate:2,strong:3}},
 CFTR:{male:1,female:1,base:{weak:2,moderate:3,strong:4}},
 HTT:{male:1,female:1,base:{weak:2,moderate:3,strong:5}},
 HBB:{male:1,female:1,base:{weak:2,moderate:3,strong:4}},
 PAH:{male:1,female:1,base:{weak:1,moderate:2,strong:3}},
 FMR1:{male:1.2,female:0.8,base:{weak:2,moderate:3,strong:4}},
 LDLR:{male:1,female:1,base:{weak:1,moderate:2,strong:3}}
};

// ---------------- SAVE PATIENT ----------------
function savePatient(){
 let id=document.getElementById("db_id").value;
 let name=document.getElementById("db_name").value;
 let age=Number(document.getElementById("db_age").value);
 let sex=document.getElementById("db_sex").value;
 let family=document.getElementById("db_family").value;
 let lifestyle=document.getElementById("db_lifestyle").value;

 let genes;
 try { genes = JSON.parse(document.getElementById("db_genes").value); }
 catch { alert("Invalid JSON"); return; }

 patientsDB[id] = {name, age, sex, family_history:family, lifestyle, genes};
 alert("Saved!");
 showDB();
}

// ---------------- SHOW DB ----------------
function showDB(){
 document.getElementById("dbView").textContent =
 JSON.stringify(patientsDB,null,2);
}

// ---------------- EXPORT DATABASE ----------------
function exportDB(){
  const dataStr = JSON.stringify(patientsDB, null, 2);
  const blob = new Blob([dataStr], {type: "application/json"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "patientsDB.json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// ---------------- IMPORT DATABASE ----------------
function importDB(event){
  const file = event.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const imported = JSON.parse(e.target.result);
      for(const id in imported){
        patientsDB[id] = imported[id]; // merge
      }
      alert("Database imported successfully!");
      showDB();
    } catch(err){
      alert("Error importing file: " + err.message);
    }
  }
  reader.readAsText(file);
}

// ---------------- PARSER ----------------
function parse(code){
 let lines=code.split("\n").map(l=>l.trim()).filter(l=>l);
 let ast=[]; let block=null;

 lines.forEach(line=>{
  if(line.endsWith("{")){
    block={name:line.replace("{","").trim(), body:[]};
    ast.push(block);
  } else if(line==="}") block=null;
  else {
    let [k,...r]=line.split(":");
    let v=r.join(":").trim().replace(/"/g,"");
    if(block) block.body.push({k,v});
    else ast.push({k,v});
  }
 });

 return ast;
}

// ---------------- RISK ----------------
function calcRisk(p){
 let score=0;

 for(let g in p.genes){
  let cond=conditionsDB[g];
  if(!cond) continue;

  let base=cond.base[p.genes[g]]||0;
  let mod=p.sex==="M"?cond.male:cond.female;

  score += base * mod;
 }

 if(p.family_history==="some") score+=2;
 if(p.family_history==="strong") score+=3;

 if(p.lifestyle==="medium") score+=1;
 if(p.lifestyle==="high") score+=2;

 let level="LOW";
 if(score>2) level="MODERATE";
 if(score>4) level="HIGH";
 if(score>6) level="CRITICAL";

 return {score,level};
}

// ---------------- EXECUTOR ----------------
function run(){
 let ast=parse(document.getElementById("codeArea").value);

 let ctx={vars:{}}, out={};

 try {

  ast.forEach(n=>{

    // LOAD PATIENT
    if(n.k==="load_patient"){
      ctx.p = patientsDB[n.v];
      if(!ctx.p) throw new Error("Patient not found");
    }

    // VARIABLES
    if(n.k==="set"){
      let [name,val] = n.v.split(" ");
      ctx.vars[name] = Number(val);
    }

    // ANALYSIS
    if(n.name==="analysis"){
      let r = calcRisk(ctx.p);
      ctx.risk = r.level;
      ctx.score = r.score;
    }

    // CONDITIONS
    if(n.k==="if"){
      let threshold = ctx.vars["risk_limit"] || 5;

      if(ctx.score >= threshold){
        out.alert = "High risk detected";
        out.recommend = "Clinical review needed";
      }
    }

    // OUTPUT BLOCK
    if(n.name==="output"){
      n.body.forEach(c=>{
        if(c.v==="risk") out.risk = ctx.risk;
        if(c.v==="score") out.score = ctx.score;
      });
    }

  });

  document.getElementById("output").textContent =
   JSON.stringify(out,null,2);

 } catch(e){
  document.getElementById("output").textContent =
   "❌ ERROR: " + e.message;
 }
}

// ---------------- TUTORIAL ----------------
function loadTutorial(step){
 let text="";

 if(step===1){
  text=`1️⃣ LOAD PATIENT

load_patient: "ID_001"

Loads patient data from the database.`;
 }

 if(step===2){
  text=`2️⃣ ANALYSIS

analysis {
}

Calculates risk score automatically.`;
 }

 if(step===3){
  text=`3️⃣ VARIABLES

set risk_limit: 5

Stores reusable values.`;
 }

 if(step===4){
  text=`4️⃣ CONDITIONS

if risk >= risk_limit {
 alert: "High risk"
}

Runs logic based on risk.`;
 }

 if(step===5){
  text=`5️⃣ OUTPUT

output {
 show: risk
 show: score
}

Controls what is displayed.`;
 }

 if(step===6){
  text=`6️⃣ FULL PROGRAM

load_patient: "ID_001"

set risk_limit: 5

analysis {}

if risk >= risk_limit {
 alert: "High risk detected"
}

output {
 show: risk
 show: score
}`;
 }

 document.getElementById("tutorialBox").textContent=text;
}
</script>

</body>
</html>
